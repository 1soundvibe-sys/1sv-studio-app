/* Formspree POST — sends to 1soundvibe@gmail.com via form mzdkvqog */
async function sendForm(data, setStatus) {
  setStatus("sending");
  try {
    const res = await fetch("https://formspree.io/f/mzdkvqog", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(data),
    });
    if (res.ok) setStatus("sent");
    else setStatus("error");
  } catch { setStatus("error"); }
}

          {["Under $100","$100–$300","$300–$500","$500–$1,000","$1,000–$2,500","$2,500+","Let's Talk"].map(b=>(
            <option key={b} value={b} style={{background:"#0a0a0a"}}>{b}</option>
          ))}
        </select>
      </div>

      {/* Timeline */}
      <div style={{marginBottom:11}}>
        <div style={{...cap,fontSize:8,color:MT2,marginBottom:5}}>Timeline / Deadline</div>
        <select value={form.timeline} onChange={e=>upd("timeline",e.target.value)}
          style={{...inputStyle(form.timeline),color:form.timeline?TX:MT2}}>
          <option value="">How soon?</option>
          {["ASAP / Urgent","Within 1 Week","Within 2 Weeks","This Month","Next Month","Flexible"].map(t=>(
            <option key={t} value={t} style={{background:"#0a0a0a"}}>{t}</option>
          ))}
        </select>
      </div>

      {/* Notes */}
      <div style={{marginBottom:20}}>
        <div style={{...cap,fontSize:8,color:MT2,marginBottom:5}}>Tell Us More</div>
        <textarea value={form.notes} onChange={e=>upd("notes",e.target.value)} rows={4}
          placeholder="Project details, vision, references, anything else we should know..."
          style={{...inputStyle(form.notes),resize:"none"}}/>
      </div>

      {/* Required note */}
      {!ready&&<div style={{...mono,fontSize:9,color:MT2,textAlign:"center",marginBottom:10}}>
        * Name, contact & at least one service required
      </div>}

      <button className="tap" onClick={submit}
        style={{width:"100%",padding:"15px",
          background:ready?G:"#1c1c1c",color:ready?"#000":MT,
          borderRadius:13,...bebas,fontSize:20,letterSpacing:"0.06em",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          transition:"all .2s",opacity:status==="sending"?.6:1,marginBottom:6}}
        disabled={status==="sending"}>
        <Send size={15}/>{status==="sending"?"SENDING...":"SEND INQUIRY"}
      </button>

      {status==="error"&&<div style={{...mono,fontSize:10,color:"#C96B6B",textAlign:"center",marginBottom:8}}>
        Couldn't send. Email us: {STUDIO_EMAIL}
      </div>}

      <div style={{...mono,fontSize:9,color:MT2,textAlign:"center",lineHeight:1.9}}>
        Sends to {STUDIO_EMAIL}<br/>
        <a href="tel:8327797244" style={{color:G}}>832-779-7244</a>{" · "}
        <a href="https://www.1svstudios.com" target="_blank" rel="noopener noreferrer" style={{color:G}}>1svstudios.com</a>
      </div>
    </div>
  );
}
